services:
  postgres:
    image: postgres:16
    container_name: erasmusjourney-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erasmus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erasmus123}
      POSTGRES_DB: ${POSTGRES_DB:-erasmusjourney}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-erasmus} -d ${POSTGRES_DB:-erasmusjourney}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
